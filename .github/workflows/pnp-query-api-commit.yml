name: PNP Query API commit workflow
on:
  workflow_call:
    secrets:
      SECRET_AUTH:
        required: true
      GCLOUD_AUTH_STAGING:
        required: true
      PATH_TO_SOLUTION:
        description: |
          The path to the solution.
        required: true
      PATH_TO_UNIT_TESTS:
        description: |
          The path to the unit tests project/solution.
        required: true
      IMAGE_NAME:
        description: |
          The name of the image to be created in GCR.
        required: true
      SERVICE_BASE_URL_STAGING:
        description: 
          The base url of the service in staging.
        required: false
      SLACK_CHANNEL:
        description: |
          The slack channel which needs to be notified in case of failure.
        required: false

    inputs:
      dotnet-version:
        description: |
          The .NET version.
        type: number
        required: false
        default: 10
      has-k6-tests:
        description: |
          If true, runs k6 tests for this API. Requires "k6-test-scripts" to run k6 tests.  
        type: boolean
        required: true
      k6-test-scripts:
        description: |
          Glob pattern to select one or multiple k6 test scripts to run.
        type: string
        required: false
        default: './test/k6/**/api*.ts'

jobs:
  test-opa-policies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Test OPA policies
        uses: extenda/actions/opa-policy-test@v0
        with:
          service-account-key: ${{ secrets.GCLOUD_AUTH_STAGING }}

      - name: Notify Slack if failed
        if: failure() && github.ref == 'refs/heads/master'
        uses: extenda/actions/slack-notify@v0
        with:
          text: |
            *Build failed for ${{ github.repository }}: ${{ github.workflow }}* :heavy_exclamation_mark:
            Build failed on ${{ github.event_name }} event. Workflow: ${{ github.workflow }}. Job: ${{github.job}}. Run id: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}>
          channel: enterprise-pnp-failed-builds
          service-account-key: ${{ secrets.SECRET_AUTH }}

  test-application:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        uses: extenda/actions/conventional-version@v0
        id: semver
        with:
          build-number: ${{ github.run_number }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '${{ inputs.dotnet-version }}.0.x'

      - uses: extenda/actions/gcp-secret-manager@v0
        with:
          service-account-key: ${{ secrets.SECRET_AUTH }}
          secrets: |
            NEXUS_PASSWORD: nexus-password
            NEXUS_USERNAME: nexus-username
      
      - name: Update nuget source
        run: |
          dotnet nuget update source Extenda \
            --username ${{ env.NEXUS_USERNAME }} \
            --password ${{ env.NEXUS_PASSWORD }} \
            --configfile nuget.config \
            --store-password-in-clear-text

      - name: Start Sonar Scanner
        uses: extenda/actions/sonar-scanner@v0
        with:
          sonar-host: https://sonarcloud.io
          sonar-scanner: dotnet
          service-account-key: ${{ secrets.SECRET_AUTH }}
          dotnet-args: /d:sonar.scanner.scanAll=false

      - name: Build solution
        run: |
          dotnet build ${{ secrets.PATH_TO_SOLUTION }} \
            --configuration Release \
            /p:Version=${{ steps.semver.outputs.semver }}
      
      - name: Run unit tests
        run: |
          dotnet test ${{ secrets.PATH_TO_UNIT_TESTS }} \
            --no-build \
            --configuration Release \
            /p:CollectCoverage=true /p:CoverletOutputFormat=opencover

      - name: Analyze with Sonar  
        uses: extenda/actions/sonar-scanner@v0
        with:
          sonar-host: https://sonarcloud.io
          sonar-scanner: dotnet
          service-account-key: ${{ secrets.SECRET_AUTH }}
      
      - name: Notify Slack if failed
        if: failure() && github.ref == 'refs/heads/master'
        uses: extenda/actions/slack-notify@v0
        with:
          text: |
            *Build failed for ${{ github.repository }}: ${{ github.workflow }}* :heavy_exclamation_mark:
            Build failed on ${{ github.event_name }} event. Workflow: ${{ github.workflow }}. Job: ${{github.job}}. Run id: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}>
          channel: ${{ secrets.SLACK_CHANNEL }}
          service-account-key: ${{ secrets.SECRET_AUTH }}

  staging:
    needs: test-application
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '${{ inputs.dotnet-version }}.0.x'

      - uses: extenda/actions/gcp-secret-manager@v0
        with:
          service-account-key: ${{ secrets.SECRET_AUTH }}
          secrets: |
            NEXUS_PASSWORD: nexus-password
            NEXUS_USERNAME: nexus-username

      - name: Update nuget source
        run: |
          dotnet nuget update source Extenda \
            --username ${{ env.NEXUS_USERNAME }} \
            --password ${{ env.NEXUS_PASSWORD }} \
            --configfile nuget.config \
            --store-password-in-clear-text

      - uses: extenda/actions/setup-gcloud@v0
        with:
          service-account-key: ${{ secrets.GCLOUD_AUTH_STAGING }}

      - name: Build and push image
        run: |
          gcloud --quiet auth configure-docker
          IMAGE=eu.gcr.io/extenda/${{ secrets.IMAGE_NAME }}
          docker build -t $IMAGE:${{ github.sha }} . -f Dockerfile
          docker push $IMAGE:${{ github.sha }}

      - name: Attest image
        uses: extenda/actions/binary-auth-attestation@v0
        with:
          image-path: eu.gcr.io/extenda/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          service-account-key: ${{ secrets.GCLOUD_AUTH_STAGING }}

      - name: Deploy to staging
        uses: extenda/actions/cloud-deploy@v0
        with:
          secrets-account-key: ${{ secrets.SECRET_AUTH }}
          service-account-key: ${{ secrets.GCLOUD_AUTH_STAGING }}
          image: eu.gcr.io/extenda/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          update-dns: always
      
      - name: Notify Slack if failed
        if: failure()
        uses: extenda/actions/slack-notify@v0
        with:
          text: |
            *Build failed for ${{ github.repository }}: ${{ github.workflow }}* :heavy_exclamation_mark:
            Build failed on ${{ github.event_name }} event. Workflow: ${{ github.workflow }}. Job: ${{github.job}}. Run id: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}>
          channel: ${{ secrets.SLACK_CHANNEL }}
          service-account-key: ${{ secrets.SECRET_AUTH }}

  acceptance:
    needs: staging
    if: ${{ github.ref == 'refs/heads/master' && inputs.has-k6-tests == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      
      - uses: extenda/actions/gcp-secret-manager@v0
        with:
          service-account-key: ${{ secrets.SECRET_AUTH }}
          secrets: |
            API_KEY: api-key-hiidentity-staff

      - name: IAM token
        id: testtoken
        uses: extenda/actions/iam-test-token@v0
        with:
          service-account-key: ${{ secrets.GCLOUD_AUTH_STAGING }}
          api-key: ${{ env.API_KEY }}
    
      - name: Run API tests
        uses: extenda/actions/k6@v0
        with:
          scripts: ${{ inputs.k6-test-scripts }}
          flags: --env IAM_TOKEN=${{ steps.testtoken.outputs.iam-token }} --env SERVICE_BASE_URL=${{ secrets.SERVICE_BASE_URL_STAGING }}

      - name: Notify Slack if failed
        if: failure()
        uses: extenda/actions/slack-notify@v0
        with:
          text: |
            *Build failed for ${{ github.repository }}: ${{ github.workflow }}* :heavy_exclamation_mark:
            Build failed on ${{ github.event_name }} event. Workflow: ${{ github.workflow }}. Job: ${{github.job}}. Run id: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}>
          channel: ${{ secrets.SLACK_CHANNEL }}
          service-account-key: ${{ secrets.SECRET_AUTH }}

  release:
    needs: [staging, acceptance]
    if: |
      always() &&
      github.ref == 'refs/heads/master' &&
      needs.staging.result == 'success' &&
      (inputs.has-k6-tests == false || needs.acceptance.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create release
        uses: extenda/actions/conventional-release@v0
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: extenda/actions/setup-gcloud@v0
        with:
          service-account-key: ${{ secrets.GCLOUD_AUTH_STAGING }}

      - name: Add tag to image
        run: |
          gcloud container images add-tag \
            eu.gcr.io/extenda/${{ secrets.IMAGE_NAME }}:${{ github.sha }} \
            eu.gcr.io/extenda/${{ secrets.IMAGE_NAME }}:${{ steps.release.outputs.version }}
      
      - name: Notify Slack if failed
        if: failure()
        uses: extenda/actions/slack-notify@v0
        with:
          text: |
            *Build failed for ${{ github.repository }}: ${{ github.workflow }}* :heavy_exclamation_mark:
            Build failed on ${{ github.event_name }} event. Workflow: ${{ github.workflow }}. Job: ${{github.job}}. Run id: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.run_id }}>
          channel: ${{ secrets.SLACK_CHANNEL }}
          service-account-key: ${{ secrets.SECRET_AUTH }}
