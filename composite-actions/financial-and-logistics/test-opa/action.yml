name: Run opa tests
description: Action for running OPA test for financial and logistics clan

inputs:
  SECRET_AUTH:
    required: true
  STYRA_TOKEN:
    required: false
    default: ''
  permission-prefix:
    type: string
    required: true
  service-name:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6

    - name: OPA/Rego unit tests
      uses: extenda/actions/opa-policy-test@v0
      with:
        service-account-key: ${{ inputs.SECRET_AUTH }}
        permission-prefix: ${{ inputs.permission-prefix }}
        service-name: ${{ inputs.service-name }}
