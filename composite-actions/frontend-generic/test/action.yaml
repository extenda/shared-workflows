name: 'Run test & build'
description: 'Run test & build for frontend service on pull request'
inputs:
  SECRET_AUTH:
    description: 'GCP Auth'
    required: true
  BUILD_TOOL:
    description: 'Build tool to use'
    required: true
  GCLOUD_AUTH_STAGING:
    description: 'GCP Auth for staging environment (used for vulnerability scan)'
    required: true
  SKIP_VULNERABILITY_SCAN:
    description: 'Whether to skip vulnerability scan (true/false)'
    required: false
    default: 'false'
  GAR_WORKFLOW:
    description: 'Use GAR auth workflow (true/false)'
    required: false
    default: 'false'
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  node-version-file:
    description: 'File containing the Node.js version to use'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Lint pull request title
      uses: extenda/actions/commitlint@v0
      with:
        message: ${{ github.event.pull_request.title }}

    - name: Determine version
      uses: extenda/actions/conventional-version@v0
      id: semver
      with:
        build-number: ${{ github.run_number }}

    - name: Cache node_modules
      uses: actions/cache@v4
      if: inputs.BUILD_TOOL == 'npm'
      id: cache-npm-node-modules
      env:
        cache-name: cache-node-modules
      with:
        path: node_modules
        key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-modules

    - name: Cache node_modules
      uses: actions/cache@v4
      if: inputs.BUILD_TOOL == 'yarn'
      id: cache-yarn-node-modules
      env:
        cache-name: cache-node-modules
      with:
        path: node_modules
        key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}
        restore-keys: |
          ${{ runner.os }}-node-modules

    - name: Cache Sonar binary
      uses: actions/cache@v4
      env:
        cache-name: cache-sonar-binary
      with:
        path: /home/runner/.sonar/native-sonar-scanner
        key: ${{ runner.os }}-cache-sonar-binary
        restore-keys: |
          ${{ runner.os }}-build-${{ env.cache-name }}

    - name: Install Node
      uses: actions/setup-node@v4
      if: inputs.node-version-file == ''
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install Node from version file
      uses: actions/setup-node@v4
      if: inputs.node-version-file != ''
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Auth to Nexus npm registry
      if: inputs.GAR_WORKFLOW != 'true'
      uses: extenda/actions/nexus-auth-npm@v0
      with:
        service-account-key: ${{ inputs.SECRET_AUTH }}

    - name: Auth to GCP
      if: inputs.GAR_WORKFLOW == 'true'
      uses: extenda/actions/setup-gcloud@v0
      with:
        service-account-key: ${{ inputs.SECRET_AUTH }}
        export-default-credentials: 'true'

    - name: Run NPM auth script
      if: inputs.GAR_WORKFLOW == 'true'
      shell: bash
      run: |
        echo "@hiiretail:registry=https://europe-west1-npm.pkg.dev/extenda/npm/" > .npmrc
        npm run auth  -- --credential-config=./.npmrc

    - name: Install dependencies
      shell: bash
      if: steps.cache-npm-node-modules.outputs.cache-hit != 'true' && inputs.BUILD_TOOL == 'npm'
      run: npm ci

    - name: Lint
      shell: bash
      if: inputs.BUILD_TOOL == 'npm'
      run: npm run lint:ci

    - name: Run unit tests with coverage
      shell: bash
      if: inputs.BUILD_TOOL == 'npm'
      run: npm run test:cov

    - name: Build
      shell: bash
      if: inputs.BUILD_TOOL == 'npm'
      run: npm run build

    - name: Install dependencies
      if: steps.cache-yarn-node-modules.outputs.cache-hit != 'true' && inputs.BUILD_TOOL == 'yarn'
      shell: bash
      run: yarn install --frozen-lockfile

    - name: Lint
      shell: bash
      if: inputs.BUILD_TOOL == 'yarn'
      run: yarn run lint:ci

    - name: Run unit tests with coverage
      shell: bash
      if: inputs.BUILD_TOOL == 'yarn'
      run: yarn run test:cov

    - name: Build
      shell: bash
      if: inputs.BUILD_TOOL == 'yarn'
      run: yarn run build

    - name: Run NPM auth script
      if: inputs.GAR_WORKFLOW == 'true'
      shell: bash
      run: |
        echo "@hiiretail:registry=https://europe-west1-npm.pkg.dev/extenda/npm/" > .npmrc
        npm run auth  -- --credential-config=./.npmrc

    - name: Build vulnerability scan image
      id: scan-image
      shell: bash
      if: inputs.SKIP_VULNERABILITY_SCAN != 'true'
      run: |
        IMAGE="${IMAGE_NAME:+${IMAGE_NAME}:${GITHUB_SHA}}"

        if [ -z "$IMAGE" ]; then
          echo "Unable to resolve vulnerability scan image tag."
          echo "Set IMAGE_NAME in caller workflow."
          exit 1
        fi

        if [ ! -f "Dockerfile" ]; then
          echo "No Dockerfile found in repository root."
          exit 1
        fi

        echo "Building local image for vulnerability scan: $IMAGE"
        if ! docker build --quiet -t "$IMAGE" .; then
          echo "Initial quiet Docker build failed. Retrying with full logs for debugging..."
          docker build -t "$IMAGE" .
          echo "Failed to build image $IMAGE."
          exit 1
        fi

        echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

    - name: Vulnerability scan
      if: inputs.SKIP_VULNERABILITY_SCAN != 'true'
      uses: extenda/actions/trivy-scan@v0
      with:
        image: ${{ steps.scan-image.outputs.image }}
        service-account-key: ${{ inputs.GCLOUD_AUTH_STAGING }}
        fail-on-vulnerabilities: true
        notify-slack-on-vulnerabilities: false

    - name: Analyze with SonarCloud
      uses: extenda/actions/sonar-scanner@v0
      with:
        sonar-host: https://sonarcloud.io
        service-account-key: ${{ inputs.SECRET_AUTH }}
        main-branch: master
